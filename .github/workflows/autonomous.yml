# .github/workflows/build-blocklist.yml
# DNS Blocklist Builder CI/CD Pipeline

name: Build DNS Blocklist

on:
  schedule:
    # Запуск каждый день в 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:        # Ручной запуск из UI GitHub
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'sources.json'

jobs:
  build:
    name: Build Blocklist
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run security audit
        run: npm audit --production --audit-level=moderate
      
      - name: Build blocklist
        run: npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: '--max-old-space-size=2048'
      
      - name: Generate blocklist files
        run: |
          mkdir -p dist
          node dist/index.js
      
      - name: Calculate file hashes
        run: |
          cd output
          sha256sum blocklist.* > checksums.txt
          md5sum blocklist.* >> checksums.txt
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blocklist-files
          path: |
            output/blocklist.*
            output/checksums.txt
          retention-days: 7
      
      - name: Create release
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          name: "Blocklist ${{ github.run_number }} - ${{ date('YYYY-MM-DD') }}"
          tag_name: "build-${{ github.run_number }}"
          body: |
            ## DNS Blocklist автоматическая сборка
            
            - **Дата**: ${{ date('YYYY-MM-DD HH:mm:ss') }}
            - **Сборка**: #${{ github.run_number }}
            - **Источники**: OISD Big, AdAway, StevenBlack, Peter Lowe
            
            ### Файлы:
            - `blocklist.txt` - формат hosts (IPv4 + IPv6)
            - `blocklist.domains` - список доменов (по одному на строку)
            - `checksums.txt` - контрольные суммы (SHA256 + MD5)
          files: |
            output/blocklist.*
            output/checksums.txt
          generate_release_notes: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Deploy to GitHub Pages
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          destination_dir: .
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy blocklist build #${{ github.run_number }}'

  validate:
    name: Validate Blocklist
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: blocklist-files
          path: ./validate
      
      - name: Validate domain syntax
        run: |
          echo "=== Domain syntax validation ==="
          
          # Проверка hosts формата
          if [ -f validate/blocklist.txt ]; then
            LINES=$(wc -l < validate/blocklist.txt)
            DOMAINS=$(grep -c '^0.0.0.0' validate/blocklist.txt || true)
            echo "✅ hosts файл: $LINES строк, $DOMAINS доменов"
            
            # Проверка на пустые строки в середине
            if grep -q '^$' validate/blocklist.txt; then
              echo "⚠️  Обнаружены пустые строки"
            fi
          fi
          
          # Проверка domains формата
          if [ -f validate/blocklist.domains ]; then
            COUNT=$(wc -l < validate/blocklist.domains)
            UNIQUE=$(sort validate/blocklist.domains | uniq | wc -l)
            echo "✅ domains файл: $COUNT строк, $UNIQUE уникальных"
            
            if [ $COUNT -ne $UNIQUE ]; then
              echo "⚠️  Найдено $((COUNT - UNIQUE)) дубликатов"
            fi
          fi
          
          # Проверка контрольных сумм
          if [ -f validate/checksums.txt ]; then
            echo "✅ checksums.txt присутствует"
            cat validate/checksums.txt
          fi
      
      - name: Check file sizes
        run: |
          echo "=== Размеры файлов ==="
          ls -lh validate/blocklist.* 2>/dev/null || echo "Нет файлов"
          
          # Проверка, что файл не пустой
          for file in validate/blocklist.*; do
            if [ -f "$file" ]; then
              SIZE=$(stat -c%s "$file")
              if [ $SIZE -eq 0 ]; then
                echo "❌ $file пустой"
                exit 1
              elif [ $SIZE -lt 10000 ]; then
                echo "⚠️  $file подозрительно маленький ($SIZE байт)"
              else
                echo "✅ $file: $(numfmt --to=iec $SIZE)"
              fi
            fi
          done

  notify:
    name: Send Notifications
    needs: [build, validate]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Check build status
        id: status
        run: |
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.validate.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ Блоклист успешно собран" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Ошибка сборки блоклиста" >> $GITHUB_OUTPUT
          fi
      
      - name: Create issue on failure
        if: steps.status.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString();
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Build failed - ${date.substring(0, 10)}`,
              body: `## Ошибка сборки блоклиста
            
**Время**: ${date}
**Сборка**: #${context.runNumber}
**Статус**: ${context.job}

Проверьте логи: ${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

Возможные причины:
- Источники недоступны
- Изменился формат данных
- Превышен лимит памяти
- Проблемы с сетью`,
              labels: ['bug', 'automated']
            });

  cleanup:
    name: Clean Old Artifacts
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const days = 30;
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);
            
            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            let deleted = 0;
            for (const artifact of artifacts.artifacts) {
              const created = new Date(artifact.created_at);
              if (created < cutoff) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                deleted++;
                console.log(`Deleted artifact: ${artifact.name} (${artifact.created_at})`);
              }
            }
            
            console.log(`Cleaned ${deleted} old artifacts`);
