name: Build DNS Blocklist

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create and run builder
        run: |
          cat > index.mjs << 'EOF'
          import { writeFileSync, mkdirSync } from 'fs';
          import { gzipSync } from 'zlib';

          const SOURCES = [
            'https://big.oisd.nl/domains',
            'https://adaway.org/hosts.txt',
            'https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts'
          ];

          const uniqueDomains = new Set();

          for (const url of SOURCES) {
            console.log(`Fetching ${url}...`);
            const res = await fetch(url);
            const text = await res.text();
            const lines = text.split('\n');
            
            for (const line of lines) {
              const trimmed = line.trim();
              if (trimmed && !trimmed.startsWith('#')) {
                const parts = trimmed.split(/\s+/);
                let domain = parts.length >= 2 ? parts[1] : parts[0];
                domain = domain.toLowerCase().replace(/\.$/, '');
                if (domain.match(/^[a-z0-9][a-z0-9.-]*[a-z0-9]$/) && domain.length <= 253) {
                  uniqueDomains.add(domain);
                }
              }
            }
          }

          const domains = Array.from(uniqueDomains).sort();
          console.log(`Unique domains: ${domains.length}`);

          const content = domains.join('\n');
          mkdirSync('./output', { recursive: true });
          writeFileSync('./output/blocklist.txt', content);
          writeFileSync('./output/blocklist.txt.gz', gzipSync(content));
          
          console.log('Done!');
          EOF
          
          node index.mjs
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: blocklist
          path: output/