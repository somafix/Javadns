# .github/workflows/autonomous.yml
name: DNS Blocklist Autonomous

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # Заодно закеширует зависимости
      
      - name: Install dependencies
        run: npm ci --omit=dev
        # npm ci работает быстро, но требует package-lock.json
      
      - name: Run blocklist builder
        run: node index.js
      
      - name: Commit and push results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add output/ data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update blocklist [skip ci]"
            git push
          fi
