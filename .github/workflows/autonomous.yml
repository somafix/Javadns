app:
  name: dns-blocklist-builder
  version: 6.0.0
  environment: production
  log_level: info
  shutdown_timeout_sec: 30

output:
  directory: ./output
  formats:
    - domains
    - hosts
  compress: true
  compress_level: 9
  hosts_threshold: 500000

sources:
  - name: OISD Big
    url: https://big.oisd.nl/domains
    enabled: true
    timeout_sec: 30
    retries: 3
  - name: AdAway
    url: https://adaway.org/hosts.txt
    enabled: true
    timeout_sec: 30
    retries: 3
