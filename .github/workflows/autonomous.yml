# .github/workflows/autonomous.yml
name: Build DNS Blocklist

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      run: npm install  # ← ИЗМЕНИТЬ С npm ci НА npm install
    
    - name: Run blocklist builder
      run: node blocklist-builder.js
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: blocklist
        path: output/