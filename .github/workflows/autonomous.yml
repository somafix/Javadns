name: Update Blocklist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write  # ЭТО РЕШАЕТ ВАШУ ОШИБКУ 403

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies (если есть)
        run: npm ci  # или просто пропустите, если нет package.json
      
      - name: Запуск вашего JS скрипта
        run: node ваш_скрипт.js  # 👈 ЗДЕСЬ ВАШ ФАЙЛ
      
      - name: Коммит и пуш изменений
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Auto-update blocklist [skip ci]"
          git push
