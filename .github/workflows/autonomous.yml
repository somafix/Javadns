# .github/workflows/autonomous.yml
name: Build DNS Blocklist

on:
  schedule:
    # Запуск каждый день в 2 часа ночи
    - cron: '0 2 * * *'
  workflow_dispatch: # Ручной запуск
  push:
    branches: [ main ]
    paths:
      - 'blocklist-builder.js'
      - '.github/workflows/autonomous.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      # или npm install если нет package-lock.json
    
    - name: Run blocklist builder
      run: node blocklist-builder.js
      env:
        NODE_ENV: production
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: blocklist-${{ github.run_id }}
        path: |
          output/*.txt
          output/*.gz
          output/*.domains
        retention-days: 7
    
    - name: Create Release
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: blocklist-${{ github.run_number }}
        name: DNS Blocklist Build ${{ github.run_number }}
        files: |
          output/*.txt
          output/*.gz
          output/*.domains
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}