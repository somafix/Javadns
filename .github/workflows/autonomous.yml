name: Build DNS Blocklist

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run blocklist builder
        run: |
          cat > builder.js << 'EOF'
          // ВСТАВИТЬ ВЕСЬ КОД СКРИПТА ЗДЕСЬ (без импорта axios, используя fetch)
          EOF
          
          node builder.js
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: blocklist
          path: output/